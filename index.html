<!DOCTYPE html>
<html>
<head>
    <title>Suma de Matrices</title>
</head>
<body>
    <h1>Operaciones con Matrices</h1>
    
    <h3>Matriz 1</h3>
    <label>Filas:</label>
    <input type="number" id="filas1" value="2" min="1">
    <label>Columnas:</label>
    <input type="number" id="columnas1" value="2" min="1">

    <h3>Matriz 2</h3>
    <label>Filas:</label>
    <input type="number" id="filas2" value="2" min="1">
    <label>Columnas:</label>
    <input type="number" id="columnas2" value="2" min="1">
    <button onclick="generarMatrices()">Generar Matrices</button>

    <br><br>
    <label>Puerto backend:</label>
    <select id="puerto-backend">
        <option value="5000" selected>5000 (Python)</option>
        <option value="3000">3000 (Node)</option>
    </select>

    <p>Operación:</p>
    <label>
        <input type="radio" name="operacion" value="suma" checked>
        Suma
    </label>
    <label>
        <input type="radio" name="operacion" value="multiplicacion">
        Multiplicación
    </label>

    <div id="contenedor-matrices"></div>
    <br>
    <button onclick="enviarAlServidor()">Calcular en Servidor</button>

    <h3>Resultado:</h3>
    <div id="resultado"></div>

    <script src="script.js"></script>
</body>
</html>
